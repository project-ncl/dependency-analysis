
# Datasource
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test
#quarkus.datasource.jdbc.url=jdbc:h2:tcp://localhost/mem:test
#quarkus.datasource.db-kind = postgresql
#quarkus.datasource.username=postgres
#quarkus.datasource.password=
#quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:62537/
quarkus.datasource.username=admin
quarkus.datasource.password=admin


# Hibernate / JPA
quarkus.hibernate-orm.database.generation=${persistence.hibernate.hbm2ddl.auto:update}
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect


# Testing
quarkus.http.test-port=8083

# Logging
quarkus.log.level=DEBUG
#quarkus.log.console.level=DEBUG
#quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n
