# Converted from testConfig.json — overrides defaults for ConfigurationTest.
da:
  pnc-url: "http://127.0.0.1:8005"
  indy:
    indy-url: "http://127.0.0.1:8004/"
    indy-group: indy-da-group
    indy-group-public: indy-da-group-public
    indy-request-timeout: 100000
    indy-request-retries: 10
  lookup-modes:
    - name: PERSISTENT
      suffixes:
        - redhat
      increment-suffix: redhat
      build-categories:
        - STANDARD
      artifact-qualities:
        - NEW
        - VERIFIED
        - TESTED
    - name: TEMPORARY
      suffixes:
        - temporary-redhat
        - redhat
      increment-suffix: temporary-redhat
      build-categories:
        - STANDARD
      artifact-qualities:
        - NEW
        - VERIFIED
        - TESTED
        - TEMPORARY
