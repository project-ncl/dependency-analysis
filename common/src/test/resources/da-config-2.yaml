# Valid dummy values for unit tests (URLs aligned with testConfig.yaml; Indy hosted repo names as requested).
da:
  pnc-url: "http://127.0.0.1:8005"
  indy:
    indy-url: "http://127.0.0.1:8004/"
    indy-group: "DA"
    indy-group-public: "DApublic"
    indy-request-timeout: 3600000
    indy-request-retries: 10
  lookup-modes:
    - name: PERSISTENT
      suffixes:
        - redhat
      increment-suffix: redhat
      build-categories:
        - STANDARD
      artifact-qualities:
        - NEW
        - VERIFIED
        - TESTED
    - name: TEMPORARY
      suffixes:
        - temporary-redhat
        - redhat
      increment-suffix: temporary-redhat
      build-categories:
        - STANDARD
      artifact-qualities:
        - NEW
        - VERIFIED
        - TESTED
        - TEMPORARY
